<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent — Chris Mitchell</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --accent: #00e5cc;
            --text-primary: #e8e8ed;
            --text-secondary: #9494a3;
            --border: #2a2a38;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .check { font-size: 3rem; margin-bottom: 1.5rem; color: var(--accent); }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; letter-spacing: -0.02em; }
        p { color: var(--text-secondary); font-size: 1.05rem; margin-bottom: 2rem; max-width: 420px; line-height: 1.7; }
        a {
            color: var(--bg-primary);
            background: var(--accent);
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div>
        <div class="check">&#10003;</div>
        <h1>Message sent.</h1>
        <p>Thanks for reaching out. I'll get back to you soon.</p>
        <a href="index.html">Back to Home</a>
    </div>
</body>
</html>
